[build]
  # Build the React app from root
  command = "npm install && npm run build"
  publish = "build"
  functions = "netlify/functions"

# Disable secrets scanning for environment variable names
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
  NODE_VERSION = "18"

# --- API redirects FIRST (explicit mappings) ---
[[redirects]]
  from = "/api/health"
  to   = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/token"
  to   = "/.netlify/functions/token"
  status = 200

[[redirects]]
  from = "/api/agora/agents"
  to   = "/.netlify/functions/agora-agents"
  status = 200

[[redirects]]
  from = "/api/agora/agents/chat"
  to   = "/.netlify/functions/agora-agents-chat"
  status = 200

[[redirects]]
  from = "/api/agora/agents/interrupt"
  to   = "/.netlify/functions/agora-agents-interrupt"
  status = 200

[[redirects]]
  from = "/api/agora/agents/stop"
  to   = "/.netlify/functions/agora-agents-stop"
  status = 200

# --- SPA catch-all LAST ---
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  # pako kept external — esbuild can't trace it through AccessToken2.js's try/catch require,
  # so leave it as a runtime require and let Netlify ship it in the function's node_modules.
  external_node_modules = ["pako"]
  included_files = ["netlify/functions/utils/**"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"