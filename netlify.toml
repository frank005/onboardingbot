[build]
  # Build the React app from root
  command = "npm install && npm run build"
  publish = "build"
  functions = "netlify/functions"

# Disable secrets scanning for environment variable names
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
  NODE_VERSION = "18"

# --- API redirects FIRST (explicit mappings) ---
[[redirects]]
  from = "/api/health"
  to   = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/token"
  to   = "/.netlify/functions/token"
  status = 200

[[redirects]]
  from = "/api/agora/agents"
  to   = "/.netlify/functions/agora-agents"
  status = 200

[[redirects]]
  from = "/api/agora/agents/chat"
  to   = "/.netlify/functions/agora-agents-chat"
  status = 200

[[redirects]]
  from = "/api/agora/agents/interrupt"
  to   = "/.netlify/functions/agora-agents-interrupt"
  status = 200

[[redirects]]
  from = "/api/agora/agents/stop"
  to   = "/.netlify/functions/agora-agents-stop"
  status = 200

[[redirects]]
  from = "/api/auth/agora/start"
  to   = "/.netlify/functions/auth-agora-start"
  status = 200

[[redirects]]
  from = "/console-callback"
  to   = "/.netlify/functions/auth-agora-callback"
  status = 200

[[redirects]]
  from = "/api/auth/agora/callback"
  to   = "/.netlify/functions/auth-agora-callback"
  status = 200

[[redirects]]
  from = "/api/auth/agora/logout"
  to   = "/.netlify/functions/auth-agora-logout"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to   = "/.netlify/functions/auth-me"
  status = 200

[[redirects]]
  from = "/api/auth/session-probe"
  to   = "/.netlify/functions/auth-session-probe"
  status = 200

# --- SPA catch-all LAST ---
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["jose"]
  included_files = ["netlify/functions/utils/**"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"